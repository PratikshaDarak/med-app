 <!DOCTYPE html>                                                                                                                        
    <html lang="en">                                                                                                                       
    <head>                                                                                                                                 
        <meta charset="UTF-8">                                                                                                             
        <meta name="viewport" content="width=device-width, initial-scale=1.0">                                                             
        <title>Gemma Med App</title>                                                                                                       
        <!-- Google Fonts -->                                                                                                              
        <link rel="preconnect" href="https://fonts.googleapis.com">                                                                        
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>                                                               
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"       
  rel="stylesheet">                                                                                                                        
                                                                                                                                           
        <!-- WebLLM Script -->                                                                                                             
        <script type="module">                                                                                                             
            import { CreateWebWorkerMLCEngine } from "https://esm.run/@mlc-ai/web-llm";                                                    
                                                                                                                                           
            window.CreateWebWorkerMLCEngine = CreateWebWorkerMLCEngine;                                                                    
        </script>                                                                                                                          
                                                                                                                                           
        <style>                                                                                                                            
            :root {                                                                                                                        
                --bg-color: #0f172a;                                                                                                       
                --card-bg: rgba(30, 41, 59, 0.7);                                                                                          
                --text-primary: #f8fafc;                                                                                                   
                --text-secondary: #94a3b8;                                                                                                 
                --accent-color: #38bdf8;                                                                                                   
                --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);                                                      
                --success-color: #34d399;                                                                                                  
                --glass-border: rgba(255, 255, 255, 0.1);                                                                                  
            }                                                                                                                              
                                                                                                                                           
            body {                                                                                                                         
                margin: 0;                                                                                                                 
                padding: 0;                                                                                                                
                font-family: 'Inter', sans-serif;                                                                                          
                background-color: var(--bg-color);                                                                                         
                background-image:                                                                                                          
                    radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),                                              
                    radial-gradient(at 100% 0%, rgba(129, 140, 248, 0.15) 0px, transparent 50%);                                           
                color: var(--text-primary);                                                                                                
                display: flex;                                                                                                             
                justify-content: center;                                                                                                   
                align-items: center;                                                                                                       
                min-height: 100vh;                                                                                                         
                overflow-x: hidden;                                                                                                        
            }                                                                                                                              
                                                                                                                                           
            .container {                                                                                                                   
                width: 100%;                                                                                                               
                max-width: 400px;                                                                                                          
                padding: 20px;                                                                                                             
                box-sizing: border-box;                                                                                                    
            }                                                                                                                              
                                                                                                                                           
            header {                                                                                                                       
                text-align: center;                                                                                                        
                margin-bottom: 30px;                                                                                                       
            }                                                                                                                              
                                                                                                                                           
            h1 {                                                                                                                           
                font-family: 'Outfit', sans-serif;                                                                                         
                font-weight: 800;                                                                                                          
                font-size: 2.5rem;                                                                                                         
                margin: 0;                                                                                                                 
                background: var(--accent-gradient);                                                                                        
                -webkit-background-clip: text;                                                                                             
                -webkit-text-fill-color: transparent;                                                                                      
                letter-spacing: -0.05em;                                                                                                   
            }                                                                                                                              
                                                                                                                                           
            p.subtitle {                                                                                                                   
                color: var(--text-secondary);                                                                                              
                font-size: 0.9rem;                                                                                                         
                margin: 5px 0 0 0;                                                                                                         
            }                                                                                                                              
                                                                                                                                           
            .card {                                                                                                                        
                background: var(--card-bg);                                                                                                
                backdrop-filter: blur(12px);                                                                                               
                -webkit-backdrop-filter: blur(12px);                                                                                       
                border: 1px solid var(--glass-border);                                                                                     
                border-radius: 24px;                                                                                                       
                padding: 25px;                                                                                                             
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);                                                                                
                margin-bottom: 20px;                                                                                                       
                transition: transform 0.3s ease;                                                                                           
            }                                                                                                                              
                                                                                                                                           
            .input-group {                                                                                                                 
                margin-bottom: 20px;                                                                                                       
            }                                                                                                                              
                                                                                                                                           
            label {                                                                                                                        
                display: block;                                                                                                            
                font-size: 0.85rem;                                                                                                        
                font-weight: 600;                                                                                                          
                color: var(--text-secondary);                                                                                              
                margin-bottom: 8px;                                                                                                        
                text-transform: uppercase;                                                                                                 
                letter-spacing: 0.05em;                                                                                                    
            }                                                                                                                              
                                                                                                                                           
            input[type="text"] {                                                                                                           
                width: 100%;                                                                                                               
                padding: 15px;                                                                                                             
                box-sizing: border-box;                                                                                                    
                background: rgba(15, 23, 42, 0.6);                                                                                         
                border: 1px solid var(--glass-border);                                                                                     
                border-radius: 12px;                                                                                                       
                color: var(--text-primary);                                                                                                
                font-family: inherit;                                                                                                      
                font-size: 1rem;                                                                                                           
                transition: all 0.3s ease;                                                                                                 
            }                                                                                                                              
                                                                                                                                           
            input[type="text"]:focus {                                                                                                     
                outline: none;                                                                                                             
                border-color: var(--accent-color);                                                                                         
                box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);                                                                             
            }                                                                                                                              
                                                                                                                                           
            button.primary-btn {                                                                                                           
                width: 100%;                                                                                                               
                padding: 16px;                                                                                                             
                background: var(--accent-gradient);                                                                                        
                border: none;                                                                                                              
                border-radius: 12px;                                                                                                       
                color: white;                                                                                                              
                font-family: 'Outfit', sans-serif;                                                                                         
                font-weight: 600;                                                                                                          
                font-size: 1rem;                                                                                                           
                cursor: pointer;                                                                                                           
                transition: all 0.3s ease;                                                                                                 
                box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);                                                                            
            }                                                                                                                              
                                                                                                                                           
            button.primary-btn:hover {                                                                                                     
                transform: translateY(-2px);                                                                                               
                box-shadow: 0 6px 20px rgba(56, 189, 248, 0.3);                                                                            
            }                                                                                                                              
                                                                                                                                           
            button.primary-btn:disabled {                                                                                                  
                background: #475569;                                                                                                       
                cursor: not-allowed;                                                                                                       
                transform: none;                                                                                                           
                box-shadow: none;                                                                                                          
            }                                                                                                                              
                                                                                                                                           
            .status-area {                                                                                                                 
                font-size: 0.85rem;                                                                                                        
                color: var(--text-secondary);                                                                                              
                text-align: center;                                                                                                        
                margin-top: 15px;                                                                                                          
                min-height: 20px;                                                                                                          
            }                                                                                                                              
                                                                                                                                           
            .results-area {                                                                                                                
                display: none;                                                                                                             
            }                                                                                                                              
                                                                                                                                           
            .results-area.active {                                                                                                         
                display: block;                                                                                                            
                animation: fadeIn 0.5s ease;                                                                                               
            }                                                                                                                              
                                                                                                                                           
            @keyframes fadeIn {                                                                                                            
                from { opacity: 0; transform: translateY(10px); }                                                                          
                to { opacity: 1; transform: translateY(0); }                                                                               
            }                                                                                                                              
                                                                                                                                           
            h2 {                                                                                                                           
                font-family: 'Outfit', sans-serif;                                                                                         
                font-size: 1.2rem;                                                                                                         
                margin: 0 0 15px 0;                                                                                                        
                color: var(--text-primary);                                                                                                
            }                                                                                                                              
                                                                                                                                           
            .medicine-list {                                                                                                               
                list-style: none;                                                                                                          
                padding: 0;                                                                                                                
                margin: 0;                                                                                                                 
            }                                                                                                                              
                                                                                                                                           
            .medicine-item {                                                                                                               
                background: rgba(15, 23, 42, 0.4);                                                                                         
                border: 1px solid var(--glass-border);                                                                                     
                border-radius: 12px;                                                                                                       
                padding: 15px;                                                                                                             
                margin-bottom: 10px;                                                                                                       
                display: flex;                                                                                                             
                justify-content: space-between;                                                                                            
                align-items: center;                                                                                                       
                cursor: pointer;                                                                                                           
                transition: all 0.2s ease;                                                                                                 
            }                                                                                                                              
                                                                                                                                           
            .medicine-item:hover {                                                                                                         
                background: rgba(56, 189, 248, 0.1);                                                                                       
                border-color: var(--accent-color);                                                                                         
                transform: translateX(5px);                                                                                                
            }                                                                                                                              
                                                                                                                                           
            .medicine-name {                                                                                                               
                font-weight: 600;                                                                                                          
                color: var(--text-primary);                                                                                                
            }                                                                                                                              
                                                                                                                                           
            .add-badge {                                                                                                                   
                font-size: 0.75rem;                                                                                                        
                font-weight: 600;                                                                                                          
                background: var(--success-color);                                                                                          
                color: #0f172a;                                                                                                            
                padding: 4px 8px;                                                                                                          
                border-radius: 20px;                                                                                                       
                text-transform: uppercase;                                                                                                 
            }                                                                                                                              
                                                                                                                                           
            /* Loading Spinner */                                                                                                          
            .spinner {                                                                                                                     
                display: inline-block;                                                                                                     
                width: 12px;                                                                                                               
                height: 12px;                                                                                                              
                border: 2px solid rgba(255,255,255,0.3);                                                                                   
                border-radius: 50%;                                                                                                        
                border-top-color: white;                                                                                                   
                animation: spin 1s ease-in-out infinite;                                                                                   
                margin-right: 8px;                                                                                                         
            }                                                                                                                              
                                                                                                                                           
            @keyframes spin {                                                                                                              
                to { transform: rotate(360deg); }                                                                                          
            }                                                                                                                              
        </style>                                                                                                                           
    </head>                                                                                                                                
    <body>                                                                                                                                 
                                                                                                                                           
        <div class="container">                                                                                                            
            <header>                                                                                                                       
                <h1>MedGemma</h1>                                                                                                          
                <p class="subtitle">Local AI Medicine Assistant</p>                                                                        
            </header>                                                                                                                      
                                                                                                                                           
            <div class="card">                                                                                                             
                <div class="input-group">                                                                                                  
                    <label for="patientName">Patient Name</label>                                                                          
                    <input type="text" id="patientName" placeholder="Enter patient name..." autocomplete="off">                            
                </div>                                                                                                                     
                                                                                                                                           
                <button id="actionBtn" class="primary-btn" disabled>Loading AI...</button>                                                 
                                                                                                                                           
                <div id="status" class="status-area">Initializing WebGPU...</div>                                                          
            </div>                                                                                                                         
                                                                                                                                           
            <div id="resultsCard" class="card results-area">                                                                               
                <h2>Prescribed Medicines</h2>                                                                                              
                <ul class="medicine-list" id="medicineList">                                                                               
                    <!-- Items will be added here dynamically -->                                                                          
                </ul>                                                                                                                      
            </div>                                                                                                                         
        </div>                                                                                                                             
                                                                                                                                           
        <script type="module">                                                                                                             
            let engine;                                                                                                                    
            const statusEl = document.getElementById('status');                                                                            
            const actionBtn = document.getElementById('actionBtn');                                                                        
            const patientInput = document.getElementById('patientName');                                                                   
            const resultsCard = document.getElementById('resultsCard');                                                                    
            const medicineList = document.getElementById('medicineList');                                                                  
                                                                                                                                           
            // Model configuration                                                                                                         
            const selectedModel = "gemma-2b-it-q4f16_1"; // Standard WebLLM model name for Gemma 2B                                        
                                                                                                                                           
            async function initAI() {                                                                                                      
                try {                                                                                                                      
                    statusEl.textContent = "Loading WebLLM...";                                                                            
                                                                                                                                           
                    // In a real scenario, you would use standard import from module                                                       
                    // But since we used esm.run, we handle it via the window object populated in head                                     
                    if (!window.CreateWebWorkerMLCEngine) {                                                                                
                        throw new Error("CreateWebWorkerMLCEngine not found. Script load might have failed.");                             
                    }                                                                                                                      
                                                                                                                                           
                    statusEl.innerHTML = `<div class="spinner"></div>Downloading model (1st time only, may take minutes)...`;              
                                                                                                                                           
                    // Initialize engine using WebWorker for better UI performance                                                         
                    engine = await window.CreateWebWorkerMLCEngine(                                                                        
                        new Worker(                                                                                                        
                            new URL("https://esm.run/@mlc-ai/web-llm", import.meta.url),                                                   
                            { type: "module" }                                                                                             
                        ),                                                                                                                 
                        selectedModel,                                                                                                     
                        {                                                                                                                  
                            initProgressCallback: (progress) => {                                                                          
                                statusEl.innerHTML = `<div class="spinner"></div>${progress.text}`;                                        
                            }                                                                                                              
                        }                                                                                                                  
                    );                                                                                                                     
                                                                                                                                           
                    statusEl.textContent = "AI Ready!";                                                                                    
                    actionBtn.textContent = "Generate Medicines";                                                                          
                    actionBtn.disabled = false;                                                                                            
                                                                                                                                           
                } catch (error) {                                                                                                          
                    console.error("Init failed:", error);                                                                                  
                    statusEl.textContent = "Failed to load AI. Check WebGPU support.";                                                     
                    statusEl.style.color = "#ef4444";                                                                                      
                }                                                                                                                          
            }                                                                                                                              
                                                                                                                                           
            async function generateMedicines() {                                                                                           
                const patient = patientInput.value.trim();                                                                                 
                if (!patient) return;                                                                                                      
                                                                                                                                           
                actionBtn.disabled = true;                                                                                                 
                actionBtn.innerHTML = `<div class="spinner"></div>Generating...`;                                                          
                statusEl.textContent = "Processing prompt...";                                                                             
                resultsCard.classList.remove('active');                                                                                    
                medicineList.innerHTML = '';                                                                                               
                                                                                                                                           
                const prompt = `Identify the patient named ${patient}. List 3-5 common medicines prescribed for standard ailments          
  associated with this patient name (simulate a medical context). Output as a simple list of medicine names only, one per line.`;          
                                                                                                                                           
                try {                                                                                                                      
                    const response = await engine.chat.completions.create({                                                                
                        messages: [                                                                                                        
                            { role: "system", content: "You are a helpful medical assistant. Output only the list of medicines, nothing    
  else." },                                                                                                                                
                            { role: "user", content: prompt }                                                                              
                        ],                                                                                                                 
                        temperature: 0.5,                                                                                                  
                    });                                                                                                                    
                                                                                                                                           
                    const text = response.choices[0].message.content;                                                                      
                    displayResults(text);                                                                                                  
                                                                                                                                           
                    actionBtn.textContent = "Generate Medicines";                                                                          
                    actionBtn.disabled = false;                                                                                            
                    statusEl.textContent = "Done!";                                                                                        
                } catch (error) {                                                                                                          
                    console.error("Generation failed:", error);                                                                            
                    statusEl.textContent = "Error generating response.";                                                                   
                    actionBtn.textContent = "Retry";                                                                                       
                    actionBtn.disabled = false;                                                                                            
                }                                                                                                                          
            }                                                                                                                              
                                                                                                                                           
            function displayResults(text) {                                                                                                
                const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);                                               
                                                                                                                                           
                if (lines.length === 0) {                                                                                                  
                    statusEl.textContent = "No medicines found in response.";                                                              
                    return;                                                                                                                
                }                                                                                                                          
                                                                                                                                           
                lines.forEach(med => {                                                                                                     
                    // Clean up common list bullet points if present                                                                       
                    const cleanMed = med.replace(/^[\d\.\-\*]+\s*/, '');                                                                   
                                                                                                                                           
                    const li = document.createElement('li');                                                                               
                    li.className = 'medicine-item';                                                                                        
                    li.innerHTML = `                                                                                                       
                        <span class="medicine-name">${cleanMed}</span>                                                                     
                        <span class="add-badge">Add to Cart</span>                                                                         
                    `;                                                                                                                     
                                                                                                                                           
                    li.addEventListener('click', () => openPharmEasy(cleanMed));                                                           
                    medicineList.appendChild(li);                                                                                          
                });                                                                                                                        
                                                                                                                                           
                resultsCard.classList.add('active');                                                                                       
            }                                                                                                                              
                                                                                                                                           
            function openPharmEasy(medicine) {                                                                                             
                const encodedMedicine = encodeURIComponent(medicine);                                                                      
                const url = `pharmeasy://search/?text=${encodedMedicine}`;                                                                 
                                                                                                                                           
                // Attempt to open app                                                                                                     
                window.location.href = url;                                                                                                
                                                                                                                                           
                // Fallback to web if app is not installed (handled after a short delay)                                                   
                setTimeout(() => {                                                                                                         
                    window.open(`https://pharmeasy.in/search/all?searchType=all&searchText=${encodedMedicine}`, '_blank');                 
                }, 500);                                                                                                                   
            }                                                                                                                              
                                                                                                                                           
            // Event Listeners                                                                                                             
            actionBtn.addEventListener('click', generateMedicines);                                                                        
                                                                                                                                           
            patientInput.addEventListener('input', () => {                                                                                 
                actionBtn.disabled = patientInput.value.trim() === '' || statusEl.textContent !== "AI Ready!" && statusEl.textContent !==  
  "Done!";                                                                                                                                 
            });                                                                                                                            
                                                                                                                                           
            // Start initialization                                                                                                        
            initAI();                                                                                                                      
        </script>                                                                                                                          
    </body>                                                                                                                                
    </html>
