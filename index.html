 <!DOCTYPE html>                                                                                                                        
    <html lang="en">                                                                                                                       
    <head>                                                                                                                                 
        <meta charset="UTF-8">                                                                                                             
        <meta name="viewport" content="width=device-width, initial-scale=1.0">                                                             
        <title>Gemma Med App</title>                                                                                                       
        <!-- Google Fonts -->                                                                                                              
        <link rel="preconnect" href="https://fonts.googleapis.com">                                                                        
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>                                                               
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;600;800&display=swap"       
  rel="stylesheet">                                                                                                                        
                                                                                                                                           
        <!-- WebLLM Script -->                                                                                                             
        <script type="module">                                                                                                             
            import { CreateWebWorkerMLCEngine } from "https://esm.run/@mlc-ai/web-llm";                                                    
                                                                                                                                           
            window.CreateWebWorkerMLCEngine = CreateWebWorkerMLCEngine;                                                                    
        </script>                                                                                                                          
                                                                                                                                           
        <style>                                                                                                                            
            :root {                                                                                                                        
                --bg-color: #0f172a;                                                                                                       
                --card-bg: rgba(30, 41, 59, 0.7);                                                                                          
                --text-primary: #f8fafc;                                                                                                   
                --text-secondary: #94a3b8;                                                                                                 
                --accent-color: #38bdf8;                                                                                                   
                --accent-gradient: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);                                                      
                --success-color: #34d399;                                                                                                  
                --glass-border: rgba(255, 255, 255, 0.1);                                                                                  
            }                                                                                                                              
                                                                                                                                           
            body {                                                                                                                         
                margin: 0;                                                                                                                 
                padding: 0;                                                                                                                
                font-family: 'Inter', sans-serif;                                                                                          
                background-color: var(--bg-color);                                                                                         
                background-image:                                                                                                          
                    radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),                                              
                    radial-gradient(at 100% 0%, rgba(129, 140, 248, 0.15) 0px, transparent 50%);                                           
                color: var(--text-primary);                                                                                                
                display: flex;                                                                                                             
                justify-content: center;                                                                                                   
                align-items: center;                                                                                                       
                min-height: 100vh;                                                                                                         
                overflow-x: hidden;                                                                                                        
            }                                                                                                                              
                                                                                                                                           
            .container {                                                                                                                   
                width: 100%;                                                                                                               
                max-width: 400px;                                                                                                          
                padding: 20px;                                                                                                             
                box-sizing: border-box;                                                                                                    
            }                                                                                                                              
                                                                                                                                           
            header {                                                                                                                       
                text-align: center;                                                                                                        
                margin-bottom: 30px;                                                                                                       
            }                                                                                                                              
                                                                                                                                           
            h1 {                                                                                                                           
                font-family: 'Outfit', sans-serif;                                                                                         
                font-weight: 800;                                                                                                          
                font-size: 2.5rem;                                                                                                         
                margin: 0;                                                                                                                 
                background: var(--accent-gradient);                                                                                        
                -webkit-background-clip: text;                                                                                             
                -webkit-text-fill-color: transparent;                                                                                      
                letter-spacing: -0.05em;                                                                                                   
            }                                                                                                                              
                                                                                                                                           
            p.subtitle {                                                                                                                   
                color: var(--text-secondary);                                                                                              
                font-size: 0.9rem;                                                                                                         
                margin: 5px 0 0 0;                                                                                                         
            }                                                                                                                              
                                                                                                                                           
            .card {                                                                                                                        
                background: var(--card-bg);                                                                                                
                const encodedMedicine = encodeURIComponent(medicine);                                                                      
                const url = `pharmeasy://search/?text=${encodedMedicine}`;                                                                 
                                                                                                                                           
                // Attempt to open app                                                                                                     
                window.location.href = url;                                                                                                
                                                                                                                                           
                // Fallback to web if app is not installed (handled after a short delay)                                                   
                setTimeout(() => {                                                                                                         
                    window.open(`https://pharmeasy.in/search/all?searchType=all&searchText=${encodedMedicine}`, '_blank');                 
                }, 500);                                                                                                                   
            }                                                                                                                              
                                                                                                                                           
            // Event Listeners                                                                                                             
            actionBtn.addEventListener('click', generateMedicines);                                                                        
                                                                                                                                           
            patientInput.addEventListener('input', () => {                                                                                 
                actionBtn.disabled = patientInput.value.trim() === '' || statusEl.textContent !== "AI Ready!" && statusEl.textContent !==  
  "Done!";                                                                                                                                 
            });                                                                                                                            
                                                                                                                                           
            // Start initialization                                                                                                        
            initAI();                                                                                                                      
        </script>                                                                                                                          
    </body>                                                                                                                                
    </html>
